# OpenOCD configuration for STM32F103CB with ST-Link

# Interface: ST-Link (v2 or compatible)
source [find interface/stlink.cfg]

# Target: STM32F1x series
source [find target/stm32f1x.cfg]

# Application flash start address (after 16KB bootloader)
set FLASH_START 0x08004000

# Commands to execute
init

# Connect under reset
reset_config srst_only srst_nogate
reset_config connect_assert_srst

# Halt the target
halt

# Flash and verify application firmware
flash write_image erase build/application/application.bin $FLASH_START
verify_image build/application/application.bin $FLASH_START

# Reset and run
reset run
shutdown
